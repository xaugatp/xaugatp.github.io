<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 – Page Not Found | Saugat Poudel</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;900&display=swap">
    <style>
        :root {
            --color-accent: #a020f0;
            --color-text: #ffffff;
            --color-text-secondary: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e, #000000);
            background-attachment: fixed;
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--color-accent), #ff6bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: var(--color-text-secondary);
            font-weight: 300;
            line-height: 1.8;
            max-width: 400px;
            margin-bottom: 40px;
        }

        a {
            display: inline-block;
            padding: 12px 32px;
            background: var(--color-accent);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        a:hover {
            background: #b44dff;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Portfolio</a>
</body>

</html>
